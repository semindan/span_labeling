  - method: json
    dataset: wmt
    task: "Identify translation errors by comparing the translation to the source text."
    format: '[{"text": "exact error span from translation", "label": "MINOR or MAJOR"}]'
    label_dict:
      MINOR: "Minor error (understandable, small mistake)"
      MAJOR: "Major error (changes meaning, serious mistake)"
    note: |
      Extract the exact text spans from the TRANSLATION that contain errors.
      Return a valid JSON array only.
      If no errors exist, return an empty array: []
    last_line: *output_line
    examples:
    - |
      Source: The boy gave his sister the red ball yesterday.
      Translation: Der Junge gab seine Schwester der rote Ball gestern .
      Output:
      [
        {"text": "gab seine Schwester", "label": "MAJOR"},
        {"text": "rote", "label": "MAJOR"},
        {"text": "gestern .", "label": "MINOR"}
      ]
# prompts/xml.yaml

note_xml: &note_xml |
  IMPORTANT: You must output the entire text, including non-tagged parts.
  Rewrite the whole input text with XML tags.
output_line: &output_line "Tagged text:"

# Prompts
prompts:
  - method: xml
    dataset: ner
    task: "Extract named entities (PERSON, ORG, LOC) from the text."
    format: '<entity type="LABEL">text</entity>'
    labels: ["PERSON", "ORG", "LOC"]
    note: *note_xml
    last_line: *output_line

  - method: xml
    dataset: error
    task: "Identify grammatical errors in the text. Only tag the incorrect words."
    format: '<error type="LABEL">text</error>'
    labels: ["GRAMMAR", "SPELLING", "PUNCTUATION"]
    note: *note_xml
    last_line: *output_line

  - method: xml
    dataset: synthetic
    task: "Find all text spans that match the given pattern queries."
    format: '<match>text</match>'
    note: *note_xml
    last_line: *output_line

  - method: xml
    dataset: multigec
    task: "Identify grammatical errors in learner-written text."
    format: '<error type="TYPE">text</error>'
    label_dict:
      R: "Replace: wrong word with category (VERB, NOUN, DET, PREP, SPELL, PUNCT, WO, OTHER) that needs to be replaced"
      M: "Missing: word is missing, use empty tag"
      U: "Unnecessary: extra word, correction is empty string"
    note: *note_xml
    last_line: *output_line

  - method: xml
    dataset: wmt
    task: "Identify translation errors by comparing the translation to the source text. Rewrite the TRANSLATION with XML tags around errors."
    format: '<error severity="LEVEL">text</error>'
    label_dict:
      0: "Minor error (understandable, small mistake)"
      1: "Major error (changes meaning, serious mistake)"
    note: |
      IMPORTANT: You must output the entire translation text, including non-tagged parts.
      Only tag errors in the TRANSLATION. Keep correct words unchanged.
    last_line: *output_line
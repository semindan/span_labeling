# prompts/xml.yaml

note_xml: &note_xml |
  IMPORTANT: Your output needs to include copy of the entire input text, including non-tagged parts. If you are not outputting any tags, you need to copy the input text literally. Surround the specific spans with the XML tags as required.
  
  Do not output any additional explanations or comments, start generating output straight away.
# Prompts
prompts:
  - method: xml
    dataset: ner
    task: 'Extract named entities (PER, ORG, LOC) from the text using XML tags. Example: <entity type="PER">John</entity> lives in <entity type="LOC">Paris</entity>.'
    format: '<entity type="LABEL"></entity>'
    label_dict:
      PER: "Names of people"
      ORG: "Organizations, companies, institutions"
      LOC: "Locations, places, geographical entities"
    note: *note_xml
    examples:
    - |
      Text: Lina Berg joined AstraTech in Stockholm after finishing her studies at Northvale University.

      Output:
      <entity type="PER">Lina Berg</entity> joined <entity type="ORG">AstraTech</entity> in <entity type="LOC">Stockholm</entity> after finishing her studies at <entity type="ORG">Northvale University</entity>.


  - method: xml
    dataset: error
    task: 'Identify grammatical errors in the text by tagging the error spans. Example: He <error type="GRAMMAR">go</error> to school.'
    format: '<error type="LABEL">text</error>'
    labels: ["GRAMMAR", "SPELLING", "PUNCTUATION"]
    note: *note_xml

  - method: xml
    dataset: synthetic
    task: 'Find all text spans that match the given pattern queries. Example: text <match>pattern</match> text'
    format: '<match>text</match>'
    note: *note_xml
    examples:
    - |
      Task: Find all sequences matching '\\w+' that are preceded by 'air'.
      Text: house wake think grey calm wake think ship fast wake think no air light music play air sad read dark air love fast angry dark red bad person dark red bad white dark red bad read work dark sometimes sad wet dark sometimes think old dark sometimes yellow car give drink tree give drink drink river

      Output:
      house wake think grey calm wake think ship fast wake think no air <match>light</match> music play air <match>sad</match> read dark air <match>love</match> fast angry dark red bad person dark red bad white dark red bad read work dark sometimes sad wet dark sometimes think old dark sometimes yellow car give drink tree give drink drink river


  - method: xml
    dataset: multigec
    task: 'Identify grammatical errors in learner-written text. Example: I <error type="R">go</error> to school <error type="M"></error>Monday and <error type="U">very</error> studied hard.'
    format: '<error type="TYPE">text</error>'
    label_dict:
      R: "Replace: incorrect expression that needs to be replaced"
      M: "Missing: part of the sentence is missing, use an empty tag"
      U: "Unnecessary: extra expression that should be deleted"
    note: *note_xml
    examples:
    - |
      Text: She go to school every day , but yesterday she forget her homework .

      Output:
      She <error type="R">go</error> to school every day <error type="U">,</error> but yesterday she <error type="R">forget</error> her homework .

  - method: xml
    dataset: wmt
    task: "Identify translation errors by comparing the translation to the source text. Rewrite the TRANSLATION with XML tags around errors."
    format: '<error type="LEVEL">text</error>'
    label_dict:
      0: "Minor error (understandable, small mistake)"
      1: "Major error (changes meaning, serious mistake)"
    note: |
      IMPORTANT: You must output the entire translation text, including non-tagged parts.
      Only tag errors in the TRANSLATION. Keep correct words unchanged.
    examples:
    - |
      Source: She visited the museum and bought a guidebook, but she forgot her umbrella.
      Translation: Sie besucht das Museum und kauft einen Reiseführer, aber sie vergessen ihren Regenschirm .

      Output:
      Sie <error type="1">besucht</error> das Museum und <error type="1">kauft</error> einen Reiseführer, aber sie <error type="1">vergessen</error> ihren Regenschirm<error type="0"> </error>.

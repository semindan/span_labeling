note_index: &note_index |
  IMPORTANT: Character positions are 0-indexed.
  - First character is at position 0
  - Spaces count as characters
  - start is inclusive, end is exclusive
output_line: &output_line "Output:"

prompts:
  - method: index
    dataset: ner
    task: "Extract named entities (PER, ORG, LOC) from the text."
    format: "[start:end] = LABEL"
    labels: ["PER", "ORG", "LOC"]
    note: *note_index
    last_line: *output_line
    examples:
    - |
      Text: Lina Berg joined AstraTech in Stockholm after finishing her studies at Northvale University.

      Output:
      [0:9] = PER  
      [17:26] = ORG  
      [30:39] = LOC  
      [71:91] = ORG  

  - method: index
    dataset: error
    task: "Identify grammatical errors in the text and classify them."
    format: "[start:end] = LABEL"
    labels: ["GRAMMAR", "SPELLING", "PUNCTUATION"]
    note: *note_index
    last_line: *output_line

  - method: index
    dataset: synthetic
    task: "Find all text spans that match the given pattern queries."
    format: "[start:end] = MATCH"
    note: *note_index
    last_line: *output_line
    examples:
    - |
      Task: Find all sequences matching '\\w+' that are preceded by 'air'.
      Text: house wake think grey calm wake think ship fast wake think no air light music play air sad read dark air love fast angry dark red bad person dark red bad white dark red bad read work dark sometimes sad wet dark sometimes think old dark sometimes yellow car give drink tree give drink drink river

      Output:
      [65:71] = MATCH
      [86:90] = MATCH
      [104:109] = MATCH

  - method: index
    dataset: multigec
    task: "Identify grammatical errors in learner-written text."
    format: "[start:end] = LABEL"
    label_dict:
      R: "Replace: wrong word with category (VERB, NOUN, DET, PREP, SPELL, PUNCT, WO, OTHER) that needs to be replaced"
      M: "Missing: word is missing"
      U: "Unnecessary: extra word"
    note: *note_index
    last_line: *output_line
    examples:
    - |
      Text: She go to school every day , but yesterday she forget her homework .
      Output:
      [4:6] = R
      [27:28] = U
      [47:53] = R


  # - method: index
  #   dataset: wmt
  #   task: "Identify spans in the translation that contain errors when compared to the source text."
  #   format: "[start:end] = LABEL"
  #   label_dict:
  #     MINOR: "Minor error (understandable, small mistake)"
  #     MAJOR: "Major error (changes meaning, serious mistake)"
  #   note: |
  #     Analyze the translation for accuracy compared to the source text.
  #     Mark spans in the TRANSLATION that are incorrect.
    
  #     Common error types:
  #     - Wrong verb tense/form
  #     - Incorrect case or gender
  #     - Wrong word choice
  #     - Missing or added words
  #     - Grammar mistakes
  #     - Punctuation errors
    
  #     IMPORTANT: Character positions are 0-indexed and refer to the TRANSLATION text.
  #     - First character is at position 0
  #     - Spaces count as characters
  #     - start is inclusive, end is exclusive
  #     - Identify the minimal span containing each error
  #   last_line: *output_line
  #   examples:
  #   - |
  #     Source: The boy gave his sister the red ball yesterday.
  #     Translation: Der Junge gab seine Schwester der rote Ball gestern .
    
  #     Explanation:
  #     - "gab seine Schwester" (chars 10-29) - wrong case for "sister"
  #     - "rote" (chars 34-38) - wrong gender agreement
  #     - "gestern ." (chars 44-53) - extra space before period
    
  #     Output:
  #     [10:29] = MAJOR
  #     [34:38] = MAJOR
  #     [44:53] = MINOR

  - method: index
    dataset: wmt
    task: "Identify translation errors by comparing the translation to the source text."
    format: "[start:end] = LABEL"
    label_dict:
      MINOR: "Minor error (understandable, small mistake)"
      MAJOR: "Major error (changes meaning, serious mistake)"
    note: |
      Mark error spans in the TRANSLATION using character positions.
      Character positions are 0-indexed (first character is at position 0).
      Spaces count as characters.
      start is inclusive, end is exclusive.
    last_line: *output_line
    examples:
    - |
      Source: The boy gave his sister the red ball yesterday.
      Translation: Der Junge gab seine Schwester der rote Ball gestern .
      Output:
      [10:29] = MAJOR
      [34:38] = MAJOR
      [44:53] = MINOR
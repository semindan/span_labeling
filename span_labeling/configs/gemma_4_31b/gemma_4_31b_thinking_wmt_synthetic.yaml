experiment:
  name: gemma_4_31b_thinking
  models:
    - name: google/gemma-4-31B-it
      mode: vllm
      enable_thinking: true
      max_completion_tokens: 16384

  dataset_groups:
    - wmt_all
    - synthetic_all
  methods:
    - type: json
      name: json

    - type: json
      name: json_structured
      use_structured_outputs: true

    - type: json_occurrence
      name: json_occurrence

    - type: json_occurrence
      name: json_occurrence_structured
      use_structured_outputs: true

    - type: xml
      name: xml

    - type: index
      name: index

    - type: index
      name: index_enriched
      enrich_prompt: true

  # seeds: [42, 43, 44, 45, 46]
  seeds: [42]

slurm:
  job_name: exp_Gemma-4-31B
  num_gpus: 2
  time: "48:00:00"
  partition: gpu-troja

providers:
  vllm:
    model: google/gemma-4-31B-it
    tensor_parallel_size: 2
    max_model_len: 24576
    reasoning_parser: gemma4
    attention_backend: TRITON_ATTN
    gpu_mem_util: 0.95
    batch_invariant: false

env:
  cuda_home: /opt/cuda/12.3
  # hf_home: /lnet/troja/work/people/<your_username>/.cache/huggingface
  hf_home: /lnet/work/people/<your_username>/.cache/huggingface/

project:
  dir: /home/<your_username>/personal_work_ms/span_labeling
  run_script: span_labeling/experiments/run.py
  max_concurrent_requests: 8

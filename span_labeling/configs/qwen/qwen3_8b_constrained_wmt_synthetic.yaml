experiment:
  name: qwen3_8b_constrained
  models:
    - name: Qwen/Qwen3-8B
      mode: vllm
      enable_thinking: false
      max_completion_tokens: 4096
      temperature: 0.6
      top_k: 20
      top_p: 0.95

  dataset_groups:
    - wmt_all
    - synthetic_all
  methods:
    - type: json
      name: json_constrained
      constrained: true

    - type: json
      name: json_structured_constrained
      use_structured_outputs: true
      constrained: true

    - type: json_occurrence
      name: json_occurrence_constrained
      constrained: true

    - type: json_occurrence
      name: json_occurrence_structured_constrained
      use_structured_outputs: true
      constrained: true

  seeds: [42, 43, 44, 45, 46]

slurm:
  job_name: exp_Qwen3-8B
  num_gpus: 1
  time: "48:00:00"

providers:
  vllm:
    model: Qwen/Qwen3-8B
    tensor_parallel_size: 1
    max_model_len: 8192
    logits_processor: span_labeling.constrained_processor:SubstringCopyLogitsProcessor

env:
  cuda_home: /opt/cuda/12.3
  hf_home: /lnet/troja/work/people/semin/.cache/huggingface

project:
  dir: /home/semin/personal_work_ms/span_labeling
  run_script: span_labeling/experiments/run.py
  max_concurrent_requests: 8

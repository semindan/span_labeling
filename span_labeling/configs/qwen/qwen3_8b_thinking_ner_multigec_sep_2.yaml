    - type: ner
      path: data/universal_ner/uner_ceb_gja.json
      name: uner_ceb_gja
    - type: ner
      path: data/universal_ner/uner_da_ddt.json
      name: uner_da_ddt
    - type: ner
      path: data/universal_ner/uner_de_pud.json
      name: uner_de_pud
    - type: ner
      path: data/universal_ner/uner_en_ewt.json

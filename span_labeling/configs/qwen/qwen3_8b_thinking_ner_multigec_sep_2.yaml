      path: data/universal_ner/uner_sk_snk.json
      name: uner_sk_snk

  # dataset_groups:
    # - ner_all
    # - multigec_all
  methods:
    - type: json
      name: json

    - type: json
      name: json_structured
      use_structured_outputs: true

    - type: json_occurrence
      name: json_occurrence

    - type: json_occurrence
      name: json_occurrence_structured
      use_structured_outputs: true

    - type: xml
      name: xml

    - type: index
      name: index
  
    - type: index
      name: index_enriched
      enrich_prompt: true

  seeds: [42, 43, 44, 45, 46]

slurm:
  job_name: exp_Qwen3-8B
  num_gpus: 1
  time: "48:00:00"
  partition: gpu-troja

providers:
  vllm:
    model: Qwen/Qwen3-8B
    tensor_parallel_size: 1
    max_model_len: 24576
    reasoning_parser: qwen3

env:
  cuda_home: /opt/cuda/12.3
  hf_home: /lnet/troja/work/people/<your_username>/.cache/huggingface

project:
  dir: /home/<your_username>/personal_work_ms/span_labeling
  run_script: span_labeling/experiments/run.py
  max_concurrent_requests: 8

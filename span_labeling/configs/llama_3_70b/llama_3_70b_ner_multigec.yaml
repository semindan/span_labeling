experiment:
  name: llama_3_70b_vanilla
  models:
    - name: meta-llama/Llama-3.3-70B-Instruct
      mode: vllm
      max_completion_tokens: 4096

  dataset_groups:
    - ner_all
    - multigec_all
  methods:
    - type: json
      name: json

    - type: json
      name: json_structured
      use_structured_outputs: true

    - type: json_occurrence
      name: json_occurrence

    - type: json_occurrence
      name: json_occurrence_structured
      use_structured_outputs: true

    - type: xml
      name: xml

    - type: index
      name: index

    - type: index
      name: index_enriched
      enrich_prompt: true

  # seeds: [42, 43, 44, 45, 46]
  seeds: [42]

slurm:
  job_name: exp_Llama-3.3-70B
  num_gpus: 4
  time: "48:00:00"
  partition: gpu-troja

providers:
  vllm:
    model: meta-llama/Llama-3.3-70B-Instruct
    tensor_parallel_size: 4
    max_model_len: 8192
    gpu_mem_util: 0.95

env:
  cuda_home: /opt/cuda/12.3
  hf_home: /lnet/work/people/semin/.cache/huggingface/

project:
  dir: /home/semin/personal_work_ms/span_labeling
  run_script: span_labeling/experiments/run.py
  max_concurrent_requests: 8

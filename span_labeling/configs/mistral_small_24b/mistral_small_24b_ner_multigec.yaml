experiment:
  name: mistral_small_24b_vanilla
  models:
    - name: mistralai/Mistral-Small-24B-Instruct-2501
      mode: vllm
      max_completion_tokens: 4096

  dataset_groups:
    - ner_all
    - multigec_all
  methods:
    - type: json
      name: json

    - type: json
      name: json_structured
      use_structured_outputs: true

    - type: json_occurrence
      name: json_occurrence

    - type: json_occurrence
      name: json_occurrence_structured
      use_structured_outputs: true

    - type: xml
      name: xml

    - type: index
      name: index

    - type: index
      name: index_enriched
      enrich_prompt: true

  seeds: [42, 43, 44, 45, 46]

slurm:
  job_name: exp_Mistral-Small-24B
  num_gpus: 2
  time: "48:00:00"
  partition: gpu-troja

providers:
  vllm:
    model: mistralai/Mistral-Small-24B-Instruct-2501
    tensor_parallel_size: 2
    max_model_len: 8192

env:
  cuda_home: /opt/cuda/12.3
  hf_home: /lnet/troja/work/people/semin/.cache/huggingface

project:
  dir: /home/semin/personal_work_ms/span_labeling
  run_script: span_labeling/experiments/run.py
  max_concurrent_requests: 8

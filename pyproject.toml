[project]
name = "span-labeling"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "accelerate>=1.10.1",
    "bitsandbytes==0.48.2",
    "fastapi==0.120.2",
    "fire>=0.7.1",
    "ipykernel>=6.30.1",
    "ollama>=0.6.0",
    "openai>=2.1.0",
    "outlines>=1.2.7",
    "sentencepiece>=0.2.1",
    "syntok>=1.4.4",
    "transformers==4.51.3",
    "torch>=2.8.0",
    "uvicorn==0.38.0",
    "wtpsplit==2.1.6",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mypy>=1.18.2",
    "pre-commit>=4.3.0",
    "ruff>=0.14.1",
]
